<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXELAYER | The Epitome of Luxury</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505; /* Deep Black */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Typography */
        h1, h2, h3, .logo {
            font-family: 'Playfair Display', serif;
        }

        /* Premium Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(15px); /* Glassmorphism effect */
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #d4af37; /* Luxury Gold */
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 45px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #d4af37;
        }

        .nav-actions {
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-actions span:hover {
            color: #d4af37;
        }

        /* Cinematic Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* High-quality Unsplash Fashion Image */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            position: relative;
        }

        .hero-content {
            max-width: 900px;
            padding: 20px;
            animation: fadeInUp 1.5s ease-out;
        }

        .hero-subtitle {
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 25px;
            display: block;
        }

        .hero h1 {
            font-size: 5.5rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 40px;
        }

        .btn-premium {
            padding: 18px 45px;
            background-color: transparent;
            color: #fff;
            border: 1px solid #d4af37;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-premium:hover {
            background-color: #d4af37;
            color: #000;
            transform: translateY(-3px);
        }

        /* Curated Collection Section */
        .collection {
            padding: 120px 5%;
            text-align: center;
            background-color: #0a0a0a;
        }

        .section-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 400;
            color: #fff;
        }

        .section-subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 80px;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            transition: transform 0.8s ease, filter 0.8s ease;
            filter: brightness(80%) grayscale(20%);
        }

        .card:hover img {
            transform: scale(1.05);
            filter: brightness(100%) grayscale(0%);
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            text-align: left;
            transition: padding-bottom 0.4s ease;
        }

        .card:hover .card-info {
            padding-bottom: 50px;
        }

        .card-info h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .card-info p {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul { display: none; }
            .hero h1 { font-size: 3.5rem; }
            .card img { height: 450px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LUXELAYER</div>
        <nav>
            <ul>
                <li><a href="#">New Arrivals</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">Bespoke</a></li>
                <li><a href="#">Journal</a></li>
            </ul>
        </nav>
        <div class="nav-actions">
            <span>Search</span> &nbsp;&nbsp;|&nbsp;&nbsp; <span>Cart (0)</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <span class="hero-subtitle">Autumn / Winter '26</span>
            <h1>Redefining Modern Elegance</h1>
            <button class="btn-premium">Explore Collection</button>
        </div>
    </section>

    <section class="collection">
        <h2 class="section-title">The Curated Selection</h2>
        <span class="section-subtitle">Exquisite pieces for the modern visionary</span>
        
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=1936&auto=format&fit=crop" alt="Luxury Jacket">
                <div class="card-info">
                    <h3>Velvet Noir Jacket</h3>
                    <p>₹ 45,000</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1584273143981-41c073dfe8f8?q=80&w=1887&auto=format&fit=crop" alt="Silk Dress">
                <div class="card-info">
                    <h3>Midnight Silk Gown</h3>
                    <p>₹ 62,500</p>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=1780&auto=format&fit=crop" alt="Leather Bag">
                <div class="card-info">
                    <h3>Signature Leather Tote</h3>
                    <p>₹ 28,000</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
